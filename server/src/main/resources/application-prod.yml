spring:
  datasource:
    password: ${DB_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
  admin:
    password: ${ADMIN_PASSWORD}
  oss:
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}

logging:
  level:
    org.springframework.security: WARN
    com.maojun: INFO
  file:
    path: /opt/mywebsite/backend/logs
